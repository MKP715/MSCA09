<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSCA09</title>
  <script>
    // GitHub Pages SPA fallback.
    // Any unknown URL hits this 404; we convert /some/path?query into
    // #/some/path?query and bounce to the SPA root so the hash router can dispatch.
    //
    // Set pathSegmentsToKeep = 1 if you deploy under a project page
    // (e.g. https://user.github.io/REPO/...) and want to preserve "REPO".
    (function () {
      var pathSegmentsToKeep = 0;
      var l = window.location;
      var segments = l.pathname.split('/').filter(Boolean);
      var basePath = '/' + segments.slice(0, pathSegmentsToKeep).join('/');
      if (basePath !== '/' && !basePath.endsWith('/')) basePath += '/';
      var rest = '/' + segments.slice(pathSegmentsToKeep).join('/');
      l.replace(l.origin + basePath + '#' + rest + l.search);
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/" />
</head>
<body>
  <p>Redirecting&hellip; <a href="/">Go to MSCA09 home</a>.</p>
</body>
</html>
