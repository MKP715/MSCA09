<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSCA09</title>
  <script>
    // GitHub Pages SPA fallback.
    // Any unknown URL hits this 404; we convert /some/path?query into
    // #/some/path?query and bounce to the SPA root so the hash router can dispatch.
    //
    // Auto-detects base path:
    //   - On *.github.io project pages: first segment is the repo name, kept as base.
    //   - On a custom domain (e.g. msca09aa.org): base is /.
    (function () {
      var l = window.location;
      var isProjectPage = /\.github\.io$/i.test(l.hostname);
      var segments = l.pathname.split('/').filter(Boolean);
      var basePath = '/' + (isProjectPage && segments.length ? segments[0] + '/' : '');
      var rest = '/' + segments.slice(isProjectPage ? 1 : 0).join('/');
      l.replace(l.origin + basePath + '#' + rest + l.search);
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/" />
</head>
<body>
  <p>Redirecting&hellip; <a href="/">Go to MSCA09 home</a>.</p>
</body>
</html>
